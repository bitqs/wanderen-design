<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;padding:28px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px 32px;align-items:start;max-width:640px}
  .stack{display:flex;flex-direction:column;gap:16px}
</style></head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Switch } = window.WanderenDesignSystem_eab830;
  function Demo(){
    const [sub,setSub] = React.useState(true);
    return (
      <div className="grid">
        <div className="stack">
          <Input label="Email" icon="mail" type="email" placeholder="you@somewhere.new" />
          <Input label="Handle" icon="user" defaultValue="wanderer_42" hint="Your name on the map" />
        </div>
        <div className="stack">
          <Input label="Email" type="email" defaultValue="nope" error="That doesn't look like an email" />
          <div className="stack" style={{gap:12}}>
            <Switch label="Dark mode" defaultChecked />
            <Switch label="Email me new field notes" checked={sub} onChange={e=>setSub(e.target.checked)} />
            <Switch label="Disabled" disabled />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
