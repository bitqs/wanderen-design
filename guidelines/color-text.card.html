<!-- @dsCard group="Colors" viewport="700x150" name="Text Inks" subtitle="Warm off-white → muted purple-grey" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;display:flex;flex-direction:column;gap:10px;justify-content:center}
  .row{display:flex;align-items:baseline;gap:14px}
  .t{font-family:var(--font-body);font-size:20px;font-weight:700}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);margin-left:auto}
</style></head>
<body>
  <div class="row"><span class="t" style="color:var(--text-hi)">Headline white — the loudest ink 标题</span><span class="tok">--text-hi · #F4F2EC</span></div>
  <div class="row"><span class="t" style="color:var(--text)">Body text — comfortable reading 正文</span><span class="tok">--text · #E8E6DF</span></div>
  <div class="row"><span class="t" style="color:var(--text-muted)">Muted — captions & secondary 次要</span><span class="tok">--text-muted · #8A8798</span></div>
  <div class="row"><span class="t" style="color:var(--text-faint)">Faint — timestamps & disabled 微弱</span><span class="tok">--text-faint · #5D5B6C</span></div>
</body></html>
