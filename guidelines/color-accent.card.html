<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:120px;border:var(--bw) solid var(--border);border-radius:var(--radius-px);overflow:hidden;display:flex;flex-direction:column}
  .chip{height:76px}
  .meta{padding:10px 12px;background:var(--surface)}
  .name{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-hi)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--red-300)"></div><div class="meta"><div class="name">--accent-bright</div><div class="hex">#FF6B78</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><div class="name">--accent / red-500</div><div class="hex">#FF4757</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--cyan-400)"></div><div class="meta"><div class="name">--cyan-400</div><div class="hex">#6BEEFF</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--tertiary)"></div><div class="meta"><div class="name">--tertiary / cyan-500</div><div class="hex">#3DE8FF</div></div></div>
</body></html>
