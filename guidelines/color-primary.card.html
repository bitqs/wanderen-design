<!-- @dsCard group="Colors" viewport="700x176" name="Primary · Gold" subtitle="The signature — logo, CTAs, focus, key accents" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;display:flex;gap:14px;flex-wrap:wrap;align-items:stretch}
  .sw{flex:1;min-width:120px;border:var(--bw) solid var(--border);border-radius:var(--radius-px);overflow:hidden;display:flex;flex-direction:column}
  .chip{height:76px}
  .meta{padding:10px 12px;background:var(--surface)}
  .name{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-hi)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase}
  .lead{flex:1.4;box-shadow:var(--shadow-pixel)}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--gold-300)"></div><div class="meta"><div class="name">--gold-300</div><div class="hex">#FFD76B</div></div></div>
  <div class="sw lead"><div class="chip" style="background:var(--primary)"></div><div class="meta"><div class="name">--primary / gold-400</div><div class="hex">#FFC83D</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><div class="meta"><div class="name">--gold-600</div><div class="hex">#E6A700</div></div></div>
</body></html>
