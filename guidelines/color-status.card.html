<!-- @dsCard group="Colors" viewport="700x176" name="Status" subtitle="Tight palette — success/info reuse cyan, warning gold, danger red" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:110px;border:var(--bw) solid var(--border);border-radius:var(--radius-px);overflow:hidden;display:flex;flex-direction:column}
  .chip{height:76px;display:flex;align-items:center;justify-content:center;font-family:var(--font-pixel);font-size:10px;color:var(--text-on-neon);letter-spacing:.08em}
  .meta{padding:10px 12px;background:var(--surface)}
  .name{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-hi)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--success)">WIN</div><div class="meta"><div class="name">--success</div><div class="hex">#3DE8FF</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--warning)">!</div><div class="meta"><div class="name">--warning</div><div class="hex">#FFC83D</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--danger)">GAME OVER</div><div class="meta"><div class="name">--danger</div><div class="hex">#FF4757</div></div></div>
</body></html>
