<!-- @dsCard group="Colors" viewport="700x196" name="Space Neutrals & Surfaces" subtitle="Warm near-black → stepped surfaces → border" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
  .sw{flex:1;min-width:96px;border-right:1px solid rgba(0,0,0,.4);display:flex;flex-direction:column}
  .chip{height:84px}
  .meta{padding:10px 10px;background:var(--surface)}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--text-hi)}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase}
  .wrap{display:flex;width:100%;border:var(--bw) solid var(--border);border-radius:var(--radius-px);overflow:hidden}
</style></head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--void)"></div><div class="meta"><div class="name">--void</div><div class="hex">#060609</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="name">--bg</div><div class="hex">#0B0B14</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="meta"><div class="name">--surface</div><div class="hex">#12121F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-raised)"></div><div class="meta"><div class="name">--surface-raised</div><div class="hex">#181826</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-hover)"></div><div class="meta"><div class="name">--surface-hover</div><div class="hex">#202032</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="meta"><div class="name">--border</div><div class="hex">#2A2A3E</div></div></div>
  </div>
</body></html>
