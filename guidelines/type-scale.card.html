<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="--text-2xs → --text-6xl on Noto Sans SC" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px 24px;display:flex;flex-direction:column;justify-content:center;gap:4px}
  .row{display:flex;align-items:baseline;gap:16px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);width:104px;flex:none}
  .s{font-family:var(--font-display);font-weight:900;color:var(--text-hi);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head>
<body>
  <div class="row"><span class="lbl">6xl · 80</span><span class="s" style="font-size:44px">wanderen</span></div>
  <div class="row"><span class="lbl">3xl · 36</span><span class="s" style="font-size:32px">边做边玩边拆解</span></div>
  <div class="row"><span class="lbl">xl · 20</span><span class="s" style="font-size:20px">游戏 × AI</span></div>
  <div class="row"><span class="lbl">base · 16</span><span class="s" style="font-size:16px;font-weight:400;color:var(--text)">正文 — body copy, the default reading size</span></div>
  <div class="row"><span class="lbl">2xs · 11</span><span class="s" style="font-size:11px;font-family:var(--font-pixel);color:var(--primary)">PRESS START</span></div>
</body></html>
