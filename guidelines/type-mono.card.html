<!-- @dsCard group="Type" viewport="700x150" name="Mono · System" subtitle="--font-mono — the rare code / metric line" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;display:flex;flex-direction:column;justify-content:center;gap:12px}
  .mono{font-family:var(--font-mono);color:var(--text-muted);font-size:14px}
  .meta{color:var(--primary)}
  kbd{font-family:var(--font-mono);font-size:12px;background:var(--surface-raised);border:var(--bw) solid var(--border);border-bottom-width:3px;border-radius:var(--radius-sm);padding:3px 8px;color:var(--text-hi)}
  .row{display:flex;gap:10px;align-items:center}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-faint)}
</style></head>
<body>
  <div class="mono"><span class="meta">2026.06.18</span> · 7 MIN READ · PHILOSOPHY</div>
  <div class="row mono">Jump in with <kbd>⌘</kbd> <kbd>K</kbd> &nbsp; or press <kbd>Enter</kbd></div>
  <div class="tok">--font-mono · system monospace · 12–14px · code, metrics, keys (the site itself uses Press Start 2P for arcade “mono”)</div>
</body></html>
