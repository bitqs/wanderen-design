<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="Strict 4px pixel grid — everything snaps" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--primary);width:100%;box-shadow:var(--shadow-pixel-sm)}
  .box{display:flex;flex-direction:column;align-items:center;gap:6px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);white-space:nowrap}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--text-faint)}
</style></head>
<body>
  <div class="box"><div class="bar" style="height:4px;width:4px"></div><div class="lbl">1</div><div class="px">4</div></div>
  <div class="box"><div class="bar" style="height:8px;width:8px"></div><div class="lbl">2</div><div class="px">8</div></div>
  <div class="box"><div class="bar" style="height:12px;width:12px"></div><div class="lbl">3</div><div class="px">12</div></div>
  <div class="box"><div class="bar" style="height:16px;width:16px"></div><div class="lbl">4</div><div class="px">16</div></div>
  <div class="box"><div class="bar" style="height:24px;width:24px"></div><div class="lbl">6</div><div class="px">24</div></div>
  <div class="box"><div class="bar" style="height:32px;width:32px"></div><div class="lbl">8</div><div class="px">32</div></div>
  <div class="box"><div class="bar" style="height:48px;width:48px"></div><div class="lbl">12</div><div class="px">48</div></div>
  <div class="box"><div class="bar" style="height:64px;width:64px"></div><div class="lbl">16</div><div class="px">64</div></div>
</body></html>
