<!-- @dsCard group="Spacing" viewport="700x150" name="Neon Glows" subtitle="Soft halos — focus, active & hero only" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:28px 30px;display:flex;gap:30px;flex-wrap:wrap;align-items:center;justify-content:center}
  .box{display:flex;flex-direction:column;align-items:center;gap:14px}
  .sq{width:58px;height:58px;border-radius:var(--radius-px)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center}
</style></head>
<body>
  <div class="box"><div class="sq" style="background:var(--primary);box-shadow:var(--glow)"></div><div class="lbl">--glow</div></div>
  <div class="box"><div class="sq" style="background:var(--primary);box-shadow:var(--glow-lg)"></div><div class="lbl">--glow-lg</div></div>
  <div class="box"><div class="sq" style="background:var(--accent);box-shadow:var(--glow-magenta)"></div><div class="lbl">--glow-magenta</div></div>
  <div class="box"><div class="sq" style="background:var(--success);box-shadow:var(--glow-lime)"></div><div class="lbl">--glow-lime</div></div>
  <div class="box"><div class="sq" style="background:var(--tertiary);box-shadow:var(--glow-violet)"></div><div class="lbl">--glow-violet</div></div>
</body></html>
