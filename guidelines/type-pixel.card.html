<!-- @dsCard group="Type" viewport="700x180" name="Pixel · Press Start 2P" subtitle="--font-pixel — arcade accents: logo, labels, CTAs. Latin only, tiny." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;display:flex;flex-direction:column;justify-content:center;gap:18px}
  .p{font-family:var(--font-pixel);color:var(--primary);letter-spacing:var(--tracking-pixel);text-transform:uppercase;text-shadow:3px 3px 0 var(--accent)}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .cta{font-family:var(--font-pixel);font-size:10px;letter-spacing:.08em;color:var(--primary)}
  .tag{font-family:var(--font-body);font-size:11px;font-weight:700;color:#fff;background:var(--accent);padding:3px 9px}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-faint)}
</style></head>
<body>
  <div class="p" style="font-size:22px">WANDEREN</div>
  <div class="row">
    <span class="cta">▶ PRESS TO PLAY</span>
    <span class="tag">NEW</span>
    <span class="cta" style="color:var(--tertiary)">GAMES</span>
    <span class="cta" style="color:var(--text-muted)">PRESS START</span>
  </div>
  <div class="tok">--font-pixel · Press Start 2P · 9–22px · logo, section labels, CTAs, scores — Latin only, never CN</div>
</body></html>
